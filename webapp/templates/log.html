<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>{{ script_key }} 终端输出</title>
    <style>
        body { background: #f5f6fa; font-family: '微软雅黑', Arial, sans-serif; }
        .log-container { width: 80%; margin: 40px auto; background: #fff; box-shadow: 0 0 12px #dcdde1; border-radius: 8px; padding: 24px; }
        h2 { color: #273c75; }
        pre { background: #222; color: #eee; padding: 16px; border-radius: 6px; font-size: 15px; overflow-x: auto; }
        a { color: #0097e6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="log-container">
        <h2>{{ script_key }} 终端输出</h2>
        <a href="{{ url_for('index') }}">返回管理页面</a>
        <pre>{{ log_content }}</pre>
    </div>
</body>
</html>
